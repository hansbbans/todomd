name: TodoMD
options:
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.hans.todomd
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 6.0.1
targets:
  TodoMDApp:
    type: application
    platform: iOS
    sources:
      - Sources/TodoMDApp
      - Sources/TodoMDCore
    dependencies:
      - package: Yams
      - target: TodoMDShareExtension
        embed: true
      - target: TodoMDWidgets
        embed: true
    entitlements:
      path: Sources/TodoMDApp/TodoMDApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hans.todomd
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_CFBundleDisplayName: todo.md
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "todo.md uses Calendar access to show your events in Today and Upcoming."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "todo.md uses the microphone so you can dictate multiple tasks with voice ramble."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "todo.md imports tasks from Apple Reminders when you run the import."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "todo.md uses speech recognition to transcribe voice ramble into structured tasks."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "todo.md uses your location to trigger reminders when you arrive at or leave saved places."
        INFOPLIST_KEY_UIBackgroundModes:
          - fetch
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers:
          - com.hans.todomd.notifications.refresh
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.hans.todomd
            CFBundleURLSchemes:
              - todomd
  TodoMDMacApp:
    type: application
    platform: macOS
    productName: TodoMD
    sources:
      - path: Sources/TodoMDApp
        excludes:
          - LaunchScreen.storyboard
      - Sources/TodoMDCore
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hans.todomd.mac
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_KEY_CFBundleDisplayName: todo.md
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "todo.md uses Calendar access to show your events in Today and Upcoming."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "todo.md uses the microphone so you can dictate multiple tasks with voice ramble."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "todo.md imports tasks from Apple Reminders when you run the import."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "todo.md uses speech recognition to transcribe voice ramble into structured tasks."
        INFOPLIST_KEY_NSLocationUsageDescription: "todo.md uses your location to trigger reminders when you arrive at or leave saved places."
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.hans.todomd.mac
            CFBundleURLSchemes:
              - todomd
  TodoMDShareExtension:
    type: app-extension
    platform: iOS
    productName: TodoMDShareExtension
    sources:
      - Sources/TodoMDShareExtension
      - Sources/TodoMDCore
    dependencies:
      - package: Yams
    entitlements:
      path: Sources/TodoMDShareExtension/TodoMDShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hans.todomd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hans.todomd.share
        INFOPLIST_FILE: Sources/TodoMDShareExtension/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
  TodoMDWidgets:
    type: app-extension
    platform: iOS
    productName: TodoMDWidgets
    sources:
      - Sources/TodoMDWidgets
      - Sources/TodoMDCore
    dependencies:
      - package: Yams
    entitlements:
      path: Sources/TodoMDWidgets/TodoMDWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hans.todomd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hans.todomd.widgets
        INFOPLIST_FILE: Sources/TodoMDWidgets/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
  TodoMDCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/TodoMDCoreTests
    dependencies:
      - target: TodoMDApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  TodoMDAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/TodoMDAppTests
    dependencies:
      - target: TodoMDApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  TodoMDAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/TodoMDAppUITests
    dependencies:
      - target: TodoMDApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TodoMDApp:
    build:
      targets:
        TodoMDApp: all
    test:
      targets:
        - name: TodoMDAppTests
        - name: TodoMDAppUITests
  TodoMDShareExtension:
    build:
      targets:
        TodoMDShareExtension: all
  TodoMDMacApp:
    build:
      targets:
        TodoMDMacApp: all
