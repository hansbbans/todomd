name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to release
        required: true
        default: main
        type: string
      internal_only:
        description: Restrict this build to internal TestFlight testing only
        required: true
        default: true
        type: boolean
      internal_groups:
        description: Optional comma-separated internal TestFlight group names or IDs; defaults to repo variable TESTFLIGHT_INTERNAL_GROUPS
        required: false
        default: ""
        type: string
      external_groups:
        description: Optional comma-separated external TestFlight group names or IDs; defaults to repo variable TESTFLIGHT_EXTERNAL_GROUPS
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: testflight-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload
    runs-on: macos-15
    timeout-minutes: 90
    env:
      PROJECT: TodoMD.xcodeproj
      SCHEME: TodoMDApp
      ARCHIVE_PATH: ${{ github.workspace }}/build/TodoMDApp.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      TEMP_PATH: ${{ github.workspace }}/build/signing-temp
      EXPORT_OPTIONS_PLIST: ${{ github.workspace }}/build/signing-temp/ExportOptions.plist
      KEYCHAIN_PATH: ${{ github.workspace }}/build/signing-temp/app-signing.keychain-db
      CERTIFICATE_PATH: ${{ github.workspace }}/build/signing-temp/build-certificate.p12
      APP_PROFILE_PATH: ${{ github.workspace }}/build/signing-temp/TodoMDApp.mobileprovision
      SHARE_PROFILE_PATH: ${{ github.workspace }}/build/signing-temp/TodoMDShareExtension.mobileprovision
      WIDGETS_PROFILE_PATH: ${{ github.workspace }}/build/signing-temp/TodoMDWidgets.mobileprovision
      AUTH_KEY_PATH: ${{ github.workspace }}/build/signing-temp/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install tooling
        run: brew install xcodegen

      - name: Swift package tests
        run: >-
          swift test
          --skip '.*testOptimisticSnapshotHydrate10000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testOptimisticSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testValidatedSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'

      - name: Compute build number
        id: build_number
        run: |
          echo "value=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))" >> "$GITHUB_OUTPUT"

      - name: Install signing assets
        id: signing_assets
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APP_PROVISION_PROFILE_BASE64: ${{ secrets.APP_PROVISION_PROFILE_BASE64 }}
          SHARE_PROVISION_PROFILE_BASE64: ${{ secrets.SHARE_PROVISION_PROFILE_BASE64 }}
          WIDGETS_PROVISION_PROFILE_BASE64: ${{ secrets.WIDGETS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p "$TEMP_PATH"

          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APP_PROVISION_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"
          printf '%s' "$SHARE_PROVISION_PROFILE_BASE64" | base64 --decode > "$SHARE_PROFILE_PATH"
          printf '%s' "$WIDGETS_PROVISION_PROFILE_BASE64" | base64 --decode > "$WIDGETS_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Apple Distribution"; then
            echo "Expected BUILD_CERTIFICATE_BASE64 to contain an Apple Distribution certificate."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision
          cp "$APP_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$SHARE_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$WIDGETS_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          profile_info() {
            local label="$1"
            local bundle_id="$2"
            local profile_path="$3"
            local plist_path="$TEMP_PATH/$label-profile.plist"

            security cms -D -i "$profile_path" > "$plist_path"

            local profile_name
            local profile_uuid
            local application_identifier
            local get_task_allow

            profile_name=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$plist_path")
            profile_uuid=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist_path")
            application_identifier=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$plist_path")
            get_task_allow=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$plist_path" 2>/dev/null || echo false)

            if [[ "$application_identifier" != *".$bundle_id" ]]; then
              echo "Provisioning profile for $label does not match bundle ID $bundle_id."
              exit 1
            fi

            if [[ "$get_task_allow" == "true" ]]; then
              echo "Provisioning profile for $label is a development profile. TestFlight requires an App Store profile."
              exit 1
            fi

            echo "${label}_profile_name=$profile_name" >> "$GITHUB_OUTPUT"
            echo "${label}_profile_uuid=$profile_uuid" >> "$GITHUB_OUTPUT"
          }

          profile_info app com.hans.todomd "$APP_PROFILE_PATH"
          profile_info share com.hans.todomd.share "$SHARE_PROFILE_PATH"
          profile_info widgets com.hans.todomd.widgets "$WIDGETS_PROFILE_PATH"

      - name: Generate release project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROFILE_NAME: ${{ steps.signing_assets.outputs.app_profile_name }}
          SHARE_PROFILE_NAME: ${{ steps.signing_assets.outputs.share_profile_name }}
          WIDGETS_PROFILE_NAME: ${{ steps.signing_assets.outputs.widgets_profile_name }}
        run: |
          set -euo pipefail

          generated_spec_path="$GITHUB_WORKSPACE/testflight-project.yml"

          cat > "$generated_spec_path" <<EOF
          include:
            - project.yml
          targets:
            TodoMDApp:
              settings:
                configs:
                  Release:
                    CODE_SIGN_STYLE: Manual
                    CODE_SIGN_IDENTITY: Apple Distribution
                    DEVELOPMENT_TEAM: "${APPLE_TEAM_ID}"
                    PROVISIONING_PROFILE_SPECIFIER: "${APP_PROFILE_NAME}"
            TodoMDShareExtension:
              settings:
                configs:
                  Release:
                    CODE_SIGN_STYLE: Manual
                    CODE_SIGN_IDENTITY: Apple Distribution
                    DEVELOPMENT_TEAM: "${APPLE_TEAM_ID}"
                    PROVISIONING_PROFILE_SPECIFIER: "${SHARE_PROFILE_NAME}"
            TodoMDWidgets:
              settings:
                configs:
                  Release:
                    CODE_SIGN_STYLE: Manual
                    CODE_SIGN_IDENTITY: Apple Distribution
                    DEVELOPMENT_TEAM: "${APPLE_TEAM_ID}"
                    PROVISIONING_PROFILE_SPECIFIER: "${WIDGETS_PROFILE_NAME}"
          EOF

          xcodegen generate --spec "$generated_spec_path"

      - name: Create export options plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          internal_only_tag='<false/>'
          if [[ "${{ inputs.internal_only }}" == 'true' ]]; then
            internal_only_tag='<true/>'
          fi

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hans.todomd</key>
              <string>${{ steps.signing_assets.outputs.app_profile_name }}</string>
              <key>com.hans.todomd.share</key>
              <string>${{ steps.signing_assets.outputs.share_profile_name }}</string>
              <key>com.hans.todomd.widgets</key>
              <string>${{ steps.signing_assets.outputs.widgets_profile_name }}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>testFlightInternalTestingOnly</key>
            ${internal_only_tag}
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          plutil -lint "$EXPORT_OPTIONS_PLIST"

      - name: Archive release build
        run: |
          set -euo pipefail

          mkdir -p build

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CURRENT_PROJECT_VERSION="${{ steps.build_number.outputs.value }}" \
            archive

      - name: Read archived app metadata
        id: app_metadata
        run: |
          set -euo pipefail

          archive_info_plist="$ARCHIVE_PATH/Info.plist"

          if [[ ! -f "$archive_info_plist" ]]; then
            echo "Archive metadata file is missing: $archive_info_plist"
            exit 1
          fi

          echo "bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleIdentifier' "$archive_info_plist")" >> "$GITHUB_OUTPUT"
          echo "version=$(/usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleShortVersionString' "$archive_info_plist")" >> "$GITHUB_OUTPUT"
          echo "build_number=$(/usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleVersion' "$archive_info_plist")" >> "$GITHUB_OUTPUT"

      - name: Upload archive to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Resolve TestFlight group targets
        id: group_targets
        env:
          INTERNAL_ONLY: ${{ inputs.internal_only }}
          INPUT_INTERNAL_GROUPS: ${{ inputs.internal_groups }}
          INPUT_EXTERNAL_GROUPS: ${{ inputs.external_groups }}
          DEFAULT_INTERNAL_GROUPS: ${{ vars.TESTFLIGHT_INTERNAL_GROUPS }}
          DEFAULT_EXTERNAL_GROUPS: ${{ vars.TESTFLIGHT_EXTERNAL_GROUPS }}
        run: |
          set -euo pipefail

          trim() {
            ruby -e 'value = STDIN.read.strip; print value' <<<"$1"
          }

          internal_groups="$(trim "${INPUT_INTERNAL_GROUPS:-}")"
          external_groups="$(trim "${INPUT_EXTERNAL_GROUPS:-}")"

          if [[ -z "$internal_groups" ]]; then
            internal_groups="$(trim "${DEFAULT_INTERNAL_GROUPS:-}")"
          fi

          if [[ -z "$external_groups" ]]; then
            external_groups="$(trim "${DEFAULT_EXTERNAL_GROUPS:-}")"
          fi

          if [[ "$INTERNAL_ONLY" == "true" && -n "$external_groups" ]]; then
            echo "Skipping external group assignment because this run is internal-only."
            external_groups=""
          fi

          echo "internal_groups=$internal_groups" >> "$GITHUB_OUTPUT"
          echo "external_groups=$external_groups" >> "$GITHUB_OUTPUT"

      - name: Attach build to TestFlight groups
        if: ${{ steps.group_targets.outputs.internal_groups != '' || steps.group_targets.outputs.external_groups != '' }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          AUTH_KEY_PATH: ${{ env.AUTH_KEY_PATH }}
          APP_BUNDLE_ID: ${{ steps.app_metadata.outputs.bundle_id }}
          APP_VERSION: ${{ steps.app_metadata.outputs.version }}
          BUILD_NUMBER: ${{ steps.app_metadata.outputs.build_number }}
          INTERNAL_GROUPS: ${{ steps.group_targets.outputs.internal_groups }}
          EXTERNAL_GROUPS: ${{ steps.group_targets.outputs.external_groups }}
        run: |
          set -euo pipefail
          ruby Tools/assign_testflight_groups.rb

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf "$TEMP_PATH"
