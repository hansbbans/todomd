name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to release
        required: true
        default: main
        type: string
      internal_only:
        description: Restrict this build to internal TestFlight testing only
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: testflight-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload
    runs-on: macos-15
    timeout-minutes: 90
    env:
      PROJECT: TodoMD.xcodeproj
      SCHEME: TodoMDApp
      ARCHIVE_PATH: ${{ github.workspace }}/build/TodoMDApp.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      CERTIFICATE_PATH: ${{ runner.temp }}/build-certificate.p12
      APP_PROFILE_PATH: ${{ runner.temp }}/TodoMDApp.mobileprovision
      SHARE_PROFILE_PATH: ${{ runner.temp }}/TodoMDShareExtension.mobileprovision
      WIDGETS_PROFILE_PATH: ${{ runner.temp }}/TodoMDWidgets.mobileprovision
      AUTH_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install tooling
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Swift package tests
        run: >-
          swift test
          --skip '.*testOptimisticSnapshotHydrate10000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testOptimisticSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testValidatedSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'

      - name: Compute build number
        id: build_number
        run: |
          echo "value=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))" >> "$GITHUB_OUTPUT"

      - name: Install signing assets
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APP_PROVISION_PROFILE_BASE64: ${{ secrets.APP_PROVISION_PROFILE_BASE64 }}
          SHARE_PROVISION_PROFILE_BASE64: ${{ secrets.SHARE_PROVISION_PROFILE_BASE64 }}
          WIDGETS_PROVISION_PROFILE_BASE64: ${{ secrets.WIDGETS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APP_PROVISION_PROFILE_BASE64" | base64 --decode > "$APP_PROFILE_PATH"
          printf '%s' "$SHARE_PROVISION_PROFILE_BASE64" | base64 --decode > "$SHARE_PROFILE_PATH"
          printf '%s' "$WIDGETS_PROVISION_PROFILE_BASE64" | base64 --decode > "$WIDGETS_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$APP_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$SHARE_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          cp "$WIDGETS_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Create export options plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          internal_only_tag='<false/>'
          if [[ "${{ inputs.internal_only }}" == 'true' ]]; then
            internal_only_tag='<true/>'
          fi

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>testFlightInternalTestingOnly</key>
            ${internal_only_tag}
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          plutil -lint "$EXPORT_OPTIONS_PLIST"

      - name: Archive release build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail

          mkdir -p build

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="${{ steps.build_number.outputs.value }}" \
            archive

      - name: Upload archive to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f \
            "$AUTH_KEY_PATH" \
            "$CERTIFICATE_PATH" \
            "$APP_PROFILE_PATH" \
            "$SHARE_PROFILE_PATH" \
            "$WIDGETS_PROFILE_PATH" \
            "$EXPORT_OPTIONS_PLIST"
