name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Toolchain Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install Tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Project
        run: xcodegen generate

      - name: Collect Changed Swift Files
        id: changed_swift
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" -- '*.swift' > /tmp/changed-swift-files.txt
          count=$(grep -c '.' /tmp/changed-swift-files.txt || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Lint Changed Swift Files
        if: steps.changed_swift.outputs.count != '0'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            swiftlint lint --strict --config .swiftlint.yml "$file"
          done < /tmp/changed-swift-files.txt

      - name: Format Check Changed Swift Files
        if: steps.changed_swift.outputs.count != '0'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            swiftformat "$file" --lint --config .swiftformat
          done < /tmp/changed-swift-files.txt

      - name: Swift Package Tests
        run: >-
          swift test
          --skip '.*testOptimisticSnapshotHydrate10000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testOptimisticSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'
          --skip '.*testValidatedSnapshotHydrate5000FilesStaysWithinPerformanceBudget.*'

      - name: Simulator Build
        run: xcodebuild -project TodoMD.xcodeproj -scheme TodoMDApp -configuration Debug -destination 'generic/platform=iOS Simulator' build

      - name: Device Build
        run: xcodebuild -project TodoMD.xcodeproj -scheme TodoMDApp -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build
